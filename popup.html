<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StealthScribe AI Audio Capture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="popup.css">
</head>

<body class="w-80 p-6 bg-slate-900 text-white antialiased">
    <!-- Header -->
    <div class="flex items-center space-x-3 mb-6">
        <div
            class="w-8 h-8 rounded bg-gradient-to-tr from-blue-600 to-cyan-400 flex items-center justify-center text-white font-black text-lg shadow-lg">
            S</div>
        <h1 class="text-xl font-bold tracking-tight">StealthScribe AI</h1>
    </div>

    <!-- Unauthenticated State -->
    <div id="unauth-view" class="flex flex-col items-center justify-center text-center space-y-4">
        <p class="text-sm text-slate-300 font-medium">Never take meeting notes again.</p>
        <button id="login-btn"
            class="w-full flex items-center justify-center space-x-3 bg-white hover:bg-slate-100 text-slate-900 py-3 rounded-lg font-bold transition-all duration-200 shadow-xl">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="currentColor"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            <span>Sign in with Google</span>
        </button>
    </div>

    <!-- Authenticated State -->
    <div id="auth-view" class="hidden flex flex-col space-y-5">
        <div class="bg-slate-800/80 border border-slate-700 p-3 rounded-lg flex items-center justify-between">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Signed in as</span>
                <span id="user-email" class="text-xs font-semibold truncate text-cyan-400 max-w-[140px]">...</span>
            </div>
            <button id="logout-btn" class="text-xs font-semibold text-slate-400 hover:text-white transition-colors">Sign
                out</button>
        </div>

        <div class="space-y-1.5">
            <div class="flex justify-between text-xs font-bold px-1">
                <span class="text-slate-300">Free Time Pool</span>
                <span id="time-left-text" class="text-cyan-400">Loading...</span>
            </div>
            <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden shadow-inner">
                <div id="time-progress"
                    class="bg-gradient-to-r from-cyan-400 to-blue-500 h-2 rounded-full transition-all duration-1000 ease-out"
                    style="width: 0%"></div>
            </div>
        </div>

        <button id="record-btn"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3.5 rounded-xl font-extrabold text-sm shadow-[0_0_15px_rgba(37,99,235,0.4)] transition-all duration-300 flex items-center justify-center space-x-2 relative group mt-2">
            <span
                class="absolute inset-0 w-full h-full bg-white opacity-0 group-hover:opacity-10 rounded-xl transition-opacity"></span>
            <span class="w-2.5 h-2.5 rounded-full bg-white animate-pulse hidden" id="recording-dot"></span>
            <span id="record-btn-text">Start Recording</span>
        </button>

        <!-- Upgrade Button -->
        <button id="upgrade-btn"
            class="w-full bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white mt-3 py-2.5 rounded-xl font-bold text-xs transition-colors flex items-center justify-center space-x-2">
            <svg class="w-4 h-4 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                <path
                    d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
            <span id="upgrade-btn-text">Upgrade to Pro</span>
        </button>
    </div>

    <!-- Supabase v2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="popup.js"></script>
</body>

</html>
